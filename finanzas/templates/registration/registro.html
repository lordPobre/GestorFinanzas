<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>FinApp · Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --purple:#a78bfa; --purple-dim:#7c3aed; --glass-bg:rgba(255,255,255,0.04); --glass-border:rgba(255,255,255,0.08); --text-primary:#f1f0ff; --text-muted:rgba(241,240,255,0.35); --surface:#0d0d1a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; background:var(--surface); color:var(--text-primary); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 70% 20%,rgba(124,58,237,0.15) 0%,transparent 60%); pointer-events:none; }
        .card { width:100%; max-width:400px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:24px; padding:40px; position:relative; z-index:1; backdrop-filter:blur(20px); }
        .logo { width:48px; height:48px; background:rgba(124,58,237,0.15); border:1px solid rgba(167,139,250,0.25); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--purple); margin:0 auto 24px; }
        h1 { font-size:22px; font-weight:600; text-align:center; margin-bottom:6px; }
        .sub { font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:32px; }
        label { display:block; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:500; margin-bottom:8px; }
        input, select { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:12px; padding:12px 16px; color:var(--text-primary); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
        input:focus { border-color:rgba(167,139,250,0.4); background:rgba(124,58,237,0.05); }
        .field { margin-bottom:14px; }
        .help { font-size:11px; color:var(--text-muted); margin-top:4px; opacity:0.7; }
        .error { font-size:11px; color:#f87171; margin-top:4px; }
        .btn { width:100%; padding:13px; background:var(--purple-dim); color:#fff; border:none; border-radius:12px; font-size:14px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.2s; margin-top:8px; }
        .btn:hover { background:#6d28d9; }
        .footer { text-align:center; margin-top:24px; font-size:13px; color:var(--text-muted); }
        .footer a { color:var(--purple); text-decoration:none; }
        ul { display:none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><i class="fas fa-user-plus"></i></div>
        <h1>Crear cuenta</h1>
        <p class="sub">Empieza a controlar tus finanzas</p>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="field">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<p class="help">{{ field.help_text }}</p>{% endif %}
                {% for error in field.errors %}<p class="error">{{ error }}</p>{% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn">Registrarme</button>
        </form>

        <div class="footer">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
        </div>
    </div>
</body>
</html>
